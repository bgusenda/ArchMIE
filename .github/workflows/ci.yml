name: 🧪 ArchMIE CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  lint-and-format:
    name: 🔍 Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      
    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort
        
    - name: 🔍 Lint with Flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings. Line length set to 88 chars
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics
        
    - name: ⚫ Check Code Formatting (Black)
      run: |
        black --check --diff .
        
    - name: 📋 Check Import Sorting (isort)
      run: |
        isort --check-only --diff .

  test-python-versions:
    name: 🧪 Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
        
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      
    - name: 🐍 Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Install tkinter if not available (for some Python versions)
        sudo apt-get update
        sudo apt-get install -y python3-tk
        
    - name: ✅ Test Import Modules
      run: |
        python -c "import tkinter; print('✅ Tkinter available')"
        python -c "import json; print('✅ JSON available')"
        python -c "import subprocess; print('✅ Subprocess available')"
        python -c "import os; print('✅ OS available')"
        
    - name: 🔍 Test Module Imports
      run: |
        python -c "
        import sys
        sys.path.append('.')
        try:
            import theme_variables
            print('✅ theme_variables imported successfully')
        except Exception as e:
            print(f'❌ Error importing theme_variables: {e}')
            sys.exit(1)
        "
        
    - name: 🧪 Syntax Check All Files
      run: |
        python -m py_compile index.py
        python -m py_compile theme_variables.py
        python -m py_compile utils.py
        python -m py_compile pages/settings_page.py
        python -m py_compile pages/commands_page.py
        echo "✅ All Python files compiled successfully"

  security-check:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      
    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: 📦 Install Security Tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety
        
    - name: 🔒 Run Bandit Security Scan
      run: |
        bandit -r . -f json -o bandit-report.json || true
        bandit -r . -ll
        
    - name: 🛡️ Check Dependencies for Vulnerabilities
      run: |
        # Create a simple requirements.txt for safety check
        echo "# No external dependencies for ArchMIE" > requirements.txt
        safety check --json || echo "⚠️ Safety check completed"

  documentation-check:
    name: 📚 Documentation Check
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      
    - name: 📝 Check Required Files
      run: |
        echo "🔍 Checking for required documentation files..."
        
        # Check for essential files
        files=("README.md" "LICENSE" "CONTRIBUTING.md" "CODE_OF_CONDUCT.md")
        for file in "${files[@]}"; do
          if [[ -f "$file" ]]; then
            echo "✅ $file exists"
          else
            echo "❌ $file is missing"
            exit 1
          fi
        done
        
    - name: 📋 Validate Markdown
      run: |
        # Basic markdown validation
        echo "📋 Validating markdown structure..."
        
        # Check for basic structure in README
        if grep -q "# 🚀 ArchMIE" README.md; then
          echo "✅ README has proper title"
        else
          echo "❌ README missing proper title"
          exit 1
        fi
        
        if grep -q "## 🌟 Features" README.md; then
          echo "✅ README has Features section"
        else
          echo "❌ README missing Features section"
          exit 1
        fi

  create-release-artifacts:
    name: 📦 Create Release Artifacts
    runs-on: ubuntu-latest
    needs: [lint-and-format, test-python-versions, security-check, documentation-check]
    if: github.event_name == 'release'
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      
    - name: 📦 Create Source Archive
      run: |
        # Create clean source archive
        tar -czf archMIE-source.tar.gz \
          --exclude='.git*' \
          --exclude='__pycache__' \
          --exclude='*.pyc' \
          --exclude='commands.json' \
          --exclude='theme.json' \
          --exclude='archMIE.log' \
          .
        
    - name: 📋 Generate Checksums
      run: |
        sha256sum archMIE-source.tar.gz > checksums.txt
        echo "📋 Generated checksums:"
        cat checksums.txt
        
    - name: 📤 Upload Release Assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./archMIE-source.tar.gz
        asset_name: archMIE-${{ github.event.release.tag_name }}-source.tar.gz
        asset_content_type: application/gzip
        
    - name: 📤 Upload Checksums
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./checksums.txt
        asset_name: checksums.txt
        asset_content_type: text/plain

  notify-success:
    name: 🎉 Success Notification
    runs-on: ubuntu-latest
    needs: [lint-and-format, test-python-versions, security-check, documentation-check]
    if: success()
    
    steps:
    - name: 🎉 Success Message
      run: |
        echo "🎉 All checks passed successfully!"
        echo "✅ Code quality: PASSED"
        echo "✅ Python compatibility: PASSED"
        echo "✅ Security scan: PASSED"
        echo "✅ Documentation: PASSED"
        echo ""
        echo "🚀 ArchMIE is ready for deployment!"